name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  grammar-tests:
    name: Hypercode grammar tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Run grammar test suite
        run: make -C EBNF test-all
