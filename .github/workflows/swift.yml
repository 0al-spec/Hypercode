name: Swift

on: [push, pull_request]

jobs:
  build-test:
    name: build & test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build
      - name: Test
        run: swift test

      - name: Emit IR v2 from examples
        run: |
          .build/debug/hypercode emit Examples/service.hc --hcs Examples/service.hcs --format json > /tmp/ir-dev.json
          .build/debug/hypercode emit Examples/service.hc --hcs Examples/service.hcs --ctx env=production --format json > /tmp/ir-prod.json
      - name: Validate IR v2 against schema
        run: npm exec --yes --package=ajv-cli@5 -- ajv validate --spec=draft2020 -s Schema/hypercode-ir-v2.schema.json -d /tmp/ir-dev.json -d /tmp/ir-prod.json

      - name: Diff IR and validate against the diff schema
        run: |
          sed 's/port: 8080/port: 9090/' Examples/service.hcs > /tmp/edited.hcs
          .build/debug/hypercode emit Examples/service.hc --hcs /tmp/edited.hcs --ctx env=production --format json > /tmp/ir-edited.json
          .build/debug/hypercode diff /tmp/ir-prod.json /tmp/ir-edited.json --format json > /tmp/diff.json || test $? -eq 1
          npm exec --yes --package=ajv-cli@5 -- ajv validate --spec=draft2020 -s Schema/hypercode-diff-v1.schema.json -d /tmp/diff.json

      - name: Codegen demo — generated artifacts fresh & contract-conformant
        run: python3 Examples/codegen-demo/check.py

      - name: Kustomize comparison — metrics + all tenant×env targets validate
        run: python3 Examples/kustomize-comparison/metrics.py --check

      - name: Ontology backend — regenerated package matches the original
        run: |
          python3 -m pip install --quiet pyyaml
          python3 Examples/ontology-backend/backend.py --check