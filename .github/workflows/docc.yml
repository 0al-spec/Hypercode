name: Deploy DocC Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Swift 6.2
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2.0'

      - name: Build documentation
        run: |
          swift package --allow-writing-to-directory ./site \
            generate-documentation \
            --target Hypercode \
            --output-path ./site \
            --transform-for-static-hosting \
            --hosting-base-path Hypercode

      - name: Add .nojekyll and index redirect
        run: |
          touch site/.nojekyll
          cat > site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Redirecting to Hypercode Documentation</title>
            <meta http-equiv="refresh" content="0; url=./documentation/hypercode/">
            <link rel="canonical" href="./documentation/hypercode/">
          </head>
          <body>
            <p>Redirecting to <a href="./documentation/hypercode/">Hypercode Documentation</a>…</p>
            <script>window.location.href = "./documentation/hypercode/";</script>
          </body>
          </html>
          EOF

      - name: Upload artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./site"

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
